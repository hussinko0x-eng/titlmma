<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Titl</title>
    <style>
        :root {
            --bg-dark: #0B0F1A;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-blue: #3B82F6;
            --brand-orange: #F37021;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        h1 { font-size: clamp(4rem, 15vw, 8rem); background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 10px; }
        h2 { font-size: 1.5rem; color: var(--text-muted); margin-bottom: 30px; font-weight: 400; }
        a {
            display: inline-block; background: linear-gradient(135deg, var(--brand-orange), #d65a0f);
            color: white; padding: 14px 36px; border-radius: 30px; font-weight: bold;
            text-decoration: none; transition: 0.3s;
        }
        a:hover { box-shadow: 0 0 20px rgba(243, 112, 33, 0.4); }
    </style>
</head>
<body>
    <h1>404</h1>
    <h2>This page doesn't exist.</h2>
    <a href="/">Back to Home</a>
</body>
</html>
